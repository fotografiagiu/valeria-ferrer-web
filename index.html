    <!-- Critical CSS - Above the fold optimization -->
    <style>
      html {
        background: #0a0a0a;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #0a0a0a;
        color: white;
        line-height: 1.6;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      /* Shell LCP móvil — mismo encuadre que Hero.tsx (object-cover) */
      #hero-lcp-shell {
        display: none;
      }

      @media (max-width: 767px) {
        #hero-lcp-shell {
          display: block;
          position: fixed;
          inset: 0;
          z-index: 0;
          overflow: hidden;
          background: #000;
          pointer-events: none;
          opacity: 1;
          visibility: visible;
          transition: opacity 0.4s ease-out, visibility 0s linear 0.4s;
        }

        #hero-lcp-shell.is-hidden {
          opacity: 0;
          visibility: hidden;
        }

        #hero-lcp-shell .hero-lcp-frame {
          position: absolute;
          inset: 0;
          overflow: hidden;
        }

        #hero-lcp-shell .hero-lcp-frame picture,
        #hero-lcp-shell .hero-lcp-frame img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
        }

        #hero-lcp-shell .hero-lcp-frame img {
          object-fit: cover;
          object-position: center;
          border: 0;
        }

        #hero-lcp-shell .hero-lcp-overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.3) 45%, rgba(0, 0, 0, 0.55));
          pointer-events: none;
        }
      }

      @media (min-width: 768px) {
        #hero-lcp-shell {
          display: none !important;
        }
      }
    </style>
